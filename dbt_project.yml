name: 'principal_de_interview'
version: '1.0.0'
config-version: 2

profile: 'dbt_duckdb'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  principal_de_interview:
    orders:
      base:
        +materialized: view
        +schema: orders_base
      staging:
        +materialized: view
        +schema: orders_staging
      dw:
        +materialized: incremental
        +schema: orders_dw
      reporting:
        +materialized: view
        +schema: orders_reporting
    merchants:
      base:
        +materialized: view
        +schema: merchants_base
      staging:
        +materialized: view
        +schema: merchants_staging
      lookup:
        +materialized: table
        +schema: merchants_lookup
